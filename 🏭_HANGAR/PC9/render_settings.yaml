# Per-aircraft render overrides for the PC-9.
# See 4.3_🔼_import_parameters_for_glb_aircraft.js and
# 6.4_🎦_create_cameras.js for the full schema.  Body-frame:
# x toward tail from CoG, y up, z toward right wing.
#
# No glb_transform block here — the PC-9 GLB already ships with the
# right orientation and scale, so it runs on the default identity
# transform.

lights:
  wing_tip_position: [-0.07,  0.09, 5.07]
  tailcone_position: [-5.8,  -0.13, 0]
  strobe_position:   [-4.7,   1.9,  0]

propeller:
  position:   [3.4, 0.22, 0]   # body-frame offset from CoG, meters
  diameter_m: 1.9               # tip-to-tip diameter, meters

# camera_positions: uncomment to override cockpit/wing defaults.
# camera_positions:
#   cockpit: {x: 0.5, y: 1.0, z: 0.0, yaw_deg: 90,    pitch_deg: 0, roll_deg: 0}
#   wing:    {x: -1.5, y: 0.5, z: -3.2, yaw_deg: -5.7, pitch_deg: 0, roll_deg: 0}
