# Per-aircraft render overrides read by the Julia loader
# (0.1_📊_aircraft_aerodynamic_and_propulsive_data.jl) and shipped to the
# browser as `render_settings`.  Any section or key omitted here falls
# back to the JS default in 4.3_🔼_import_parameters_for_glb_aircraft.js
# and 6.4_🎦_create_cameras.js, so a minimal file is fine.
#
# Body-frame convention: x toward the tail from CoG, y up from CoG,
# z toward the right wing from CoG.  Matches the convention used by
# the aerodynamic YAML's visual_geometry block.

glb_transform:
  rotation_deg:  {x: 0, y: -90, z: 0}
  translation_m: {x: -4, y: -5, z: -2}
  scale: 1

# camera_positions: uncomment and tune if the MIG21 cockpit/wing views
# need custom placement.  Without this block, defaults apply.
# camera_positions:
#   cockpit: {x: 0.5, y: 1.0, z: 0.0, yaw_deg: 90,    pitch_deg: 0, roll_deg: 0}
#   wing:    {x: -1.5, y: 0.5, z: -3.2, yaw_deg: -5.7, pitch_deg: 0, roll_deg: 0}
