<body>
    <input type="file" id="fileInput" accept=".glb" style="display: none;" />

    <!--
      Startup loading overlay. Visible from the moment the HTML is parsed so
      the user sees something meaningful immediately — before Babylon, the
      scene, or the WebSocket handshake have had a chance to run. Hidden by
      the main render loop (6.1) once the simulation is ready to be unpaused:
      window.initialDataReceived === true AND !window.isGlbLoading.
      Shares the #glbLoadingOverlay id so 4.3_🔼_import_parameters_for_glb_aircraft.js
      can update its text to "Loading aircraft model (…)" during GLB upload.
      The inline script below fetches /mission_info as soon as the body
      parses so the overlay shows the aircraft name and full mission
      configuration instead of a blank "Loading…" — the previous behaviour
      left the user staring at a featureless screen for several seconds.
    -->
    <div id="glbLoadingOverlay"
         style="position:fixed;top:0;left:0;width:100%;height:100%;
                background:rgba(0,0,0,0.78);color:#fff;
                display:flex;flex-direction:column;align-items:center;
                justify-content:center;font-family:'Segoe UI',Arial,sans-serif;
                font-size:18px;letter-spacing:0.3px;z-index:99999;
                pointer-events:none;text-align:left;padding:24px;
                box-sizing:border-box;">
        <div id="glbLoadingTitle" style="font-size:24px;font-weight:bold;
             margin-bottom:18px;letter-spacing:0.6px;">Loading…</div>
        <pre id="glbLoadingMissionInfo" style="font-family:'Consolas',
             'Courier New',monospace;font-size:14px;line-height:1.45;
             color:#ddd;background:rgba(255,255,255,0.04);
             padding:14px 22px;border-radius:6px;margin:0;max-width:80vw;
             max-height:60vh;overflow:auto;white-space:pre-wrap;"></pre>
    </div>

    <script>
    // Fetch mission info as early as possible (before the main bundle even
    // starts loading) so the user sees the aircraft name and active
    // mission settings while the GLB / aero database stream in. The
    // overlay would otherwise sit blank for several seconds.
    (function () {
        function renderMissionInfo(aircraftName, yamlText) {
            var titleEl = document.getElementById('glbLoadingTitle');
            var infoEl = document.getElementById('glbLoadingMissionInfo');
            if (titleEl) {
                titleEl.textContent = 'Loading ' + (aircraftName || '(unknown aircraft)');
            }
            if (infoEl) {
                // Strip block comments and blank-line clusters so the user
                // sees a compact key:value list, not the full file.
                var trimmed = (yamlText || '')
                    .split(/\r?\n/)
                    .filter(function (line) {
                        var t = line.trim();
                        return t.length > 0 && !t.startsWith('#');
                    })
                    .join('\n');
                infoEl.textContent = trimmed || '(mission file empty)';
            }
        }
        try {
            fetch('/mission_info', { cache: 'no-store' })
                .then(function (r) {
                    var name = r.headers.get('X-Aircraft-Name') || '';
                    return r.text().then(function (txt) { return [name, txt]; });
                })
                .then(function (pair) { renderMissionInfo(pair[0], pair[1]); })
                .catch(function (err) {
                    var titleEl = document.getElementById('glbLoadingTitle');
                    if (titleEl) titleEl.textContent = 'Loading…';
                    var infoEl = document.getElementById('glbLoadingMissionInfo');
                    if (infoEl) infoEl.textContent = '(mission info unavailable: ' + err + ')';
                });
        } catch (err) {
            // Browsers without fetch — leave the default text in place.
        }
    })();
    </script>

    <canvas id="renderCanvas"></canvas>
